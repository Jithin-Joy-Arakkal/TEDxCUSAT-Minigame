<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEDxCUSAT Idea Collector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <h1>TEDxCUSAT Idea Collector</h1>
        <p>Collect falling ideas to spread knowledge! Click on the ideas as they fall to score points. Collect 10 ideas to win!</p>
        <button id="start-btn">Start Game</button>
    </div>
    <div id="game-screen" style="display: none;">
        <canvas id="game-canvas" width="800" height="600"></canvas>
        <div id="score">Score: 0</div>
        <button id="restart-btn" style="display: none;">Restart</button>
        <div id="win-screen" style="display: none;">
            <h2>Congratulations!</h2>
            <p>You've collected 10 ideas and spread knowledge at TEDxCUSAT!</p>
            <button id="win-restart-btn">Play Again</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
